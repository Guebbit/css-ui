version: 2 # Dependabot config schema version.

updates:
  # Keep npm dependencies current for the package at the repository root.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      # Monthly cadence keeps update noise manageable for maintainers.
      interval: "monthly"
    # Limit how many grouped npm update PRs can stay open at once.
    open-pull-requests-limit: 1
    groups:
      # Group all npm dependency updates into a single PR per run.
      npm-dependencies:
        patterns:
          - "*"

  # Keep GitHub Actions versions up to date in workflow files.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Match npm cadence so dependency maintenance happens in one window.
      interval: "monthly"
    # Keep only one grouped Actions update PR open at a time.
    open-pull-requests-limit: 1
    groups:
      # Group all Actions version bumps into one PR per run.
      github-actions:
        patterns:
          - "*"
