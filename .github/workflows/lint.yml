name: Lint

on:
  # Run lint checks for all pull requests.
  pull_request:
  # Keep main branch lint-clean after merges.
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Fast feedback workflow focused only on linting tasks.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run style lint
        run: npm run lint:styles

      - name: Run markdown lint
        run: npm run lint:md

      - name: Run JavaScript lint
        run: npm run lint:js
