name: CI

# Boilerplate CI:
# - lint-build-test verifies library quality gates
# - docs-build verifies docs build and stores static output as artifact
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build distributable CSS bundles from source SCSS.
      - name: Build CSS library
        run: npm run build

      # Run repository test suite (compile + lint checks in tests).
      - name: Run unit tests
        run: npm test

      # Enforce stylelint rules for generated/tested CSS files.
      - name: Run stylelint
        run: npm run lint

  docs-build:
    name: Build Docs (E2E)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the VitePress site to ensure docs/examples compile end-to-end.
      - name: Build VitePress docs
        run: npm run docs:build

      # Upload static docs output for manual inspection/download from CI.
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist/
          retention-days: 7
